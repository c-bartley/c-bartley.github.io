# ============================================================
# Site Settings
# ============================================================
title: Chris Bartley
tagline: Endangered Language Technology Researcher
description: >-
  PhD researcher at the University of Sheffield specialising in speech technology
  for endangered languages, with a focus on Manx Gaelic (Gaelg). Building AI tools
  to help preserve and revitalise minority languages in the digital age.
url: "https://chris-sj-bartley.github.io"   # Change to custom domain when ready
baseurl: ""
lang: en-GB

# ============================================================
# Author / Identity (used by jekyll-seo-tag and the Hamilton theme)
# ============================================================
author: Chris Bartley
email: csjbartley1@sheffield.ac.uk
avatar: /assets/images/me.jpeg

# Social links (used by jekyll-seo-tag for JSON-LD)
social:
  name: Chris Bartley
  links:
    - https://github.com/chris-sj-bartley
    - https://www.linkedin.com/in/chris-bartley-895b811ab/
    - https://orcid.org/0009-0007-2882-6268
    - https://gaelgai.im

# ============================================================
# Build Settings
# ============================================================
markdown: kramdown
kramdown:
  input: GFM
  hard_wrap: false
  syntax_highlighter: rouge

permalink: /blog/:year/:month/:title/
excerpt_separator: <!--more-->

# ============================================================
# Theme — Hamilton (https://github.com/ngzhio/jekyll-theme-hamilton)
# ============================================================
remote_theme: ngzhio/jekyll-theme-hamilton
skin: sunset

# ============================================================
# Plugins (all supported by GitHub Pages)
# ============================================================
plugins:
  - jekyll-remote-theme
  - jekyll-feed
  - jekyll-sitemap
  - jekyll-seo-tag

# Feed settings
feed:
  posts_limit: 20

# Hide the sidebar "Subscribe" (RSS) link — the feed still exists at /feed.xml
subscribe: false

# ============================================================
# Collections & Defaults
# ============================================================
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      author: ["Chris Bartley"]
      crosspost: true
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"

# ============================================================
# Exclude from build
# ============================================================
exclude:
  - README.md
  - LICENSE
  - Gemfile
  - Gemfile.lock
  - SETUP_GUIDE.md
  - "*.sh"
  - vendor/
